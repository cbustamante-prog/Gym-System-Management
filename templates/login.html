{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card shadow-lg mt-4 animate-in">
            <div class="text-center mb-4">
                <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">
                    <i class="fas fa-dumbbell text-gold"></i>
                </div>
                <h2 class="fw-bold text-white">Fit<span class="text-gold">Nova</span></h2>
                <p class="text-muted small text-uppercase" style="letter-spacing: 3px; font-weight: 600;">Member Login
                </p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-1"></i>Username</label>
                    <input type="text" class="form-control form-control-lg" name="username" placeholder="Enter username"
                        required>
                </div>
                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-lock me-1"></i>Password</label>
                    <input type="password" class="form-control form-control-lg" name="password"
                        placeholder="Enter password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-arrow-right-to-bracket me-2"></i>Sign In
                    </button>
                </div>
            </form>
            <div class="mt-4 text-center">
                <p class="text-muted small">New here? <a href="{{ url_for('register') }}"
                        class="text-gold text-decoration-none fw-bold">Join the Team <i
                            class="fas fa-arrow-right ms-1"></i></a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
