{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="auth-card animate-in">
            <div class="d-flex align-items-center mb-4">
                <div style="width:42px;height:42px;border-radius:10px;background:rgba(212,175,55,0.1);display:flex;align-items:center;justify-content:center;" class="me-3">
                    <i class="fas fa-plus-circle text-gold"></i>
                </div>
                <div>
                    <h3 class="text-gold mb-0 fw-bold">New Plan</h3>
                    <p class="text-muted small mb-0">Create a membership tier</p>
                </div>
            </div>
            <hr style="border-color: rgba(212,175,55,0.15);">
            <form method="POST" class="mt-4">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-tag me-1"></i>Plan Name</label>
                    <input type="text" class="form-control" name="name" placeholder="e.g. Premium Gold" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-align-left me-1"></i>Description</label>
                    <textarea class="form-control" name="description" rows="3" placeholder="Describe what's included..." required></textarea>
                </div>
                <div class="row g-3">
                    <div class="col-md-6 mb-3">
                        <label class="form-label"><i class="fas fa-peso-sign me-1"></i>Price</label>
                        <input type="number" step="0.01" class="form-control" name="price" placeholder="0.00" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label"><i class="fas fa-calendar me-1"></i>Duration (Months)</label>
                        <input type="number" class="form-control" name="duration" placeholder="1" required>
                    </div>
                </div>
                <div class="d-grid gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check me-1"></i>Create Plan
                    </button>
                    <a href="{{ url_for('manage_plans') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
